[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
hub = "CeUJv3YczYt8EeXvvcHNf1UZjSGapLc77XHQPqEMMSLP"
offer = "Frq3AZaxxRDncWbrKf6PBjEYREMp8tLQuzD1XUBNcLUZ"
price = "FVnKLFiYQFzCFJkGnn5ptEAXszQRfxVPuV7wBFhcFRHY"
profile = "14QsEiiC1GDujKagkJ316P81dJUQ7QxsQrzz7ggQg7qQ"
trade = "FyCprmE9zhs29WRN48Y4cpK4dX552uKWwnzapu9bVLbM"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = [
    "programs/hub",
    "programs/offer",
    "programs/trade",
    "programs/price",
    "programs/profile",
]

[scripts]
test = "ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 0
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "http://localhost:8899"
ledger = ".anchor/test-ledger"
rpc_port = 8899
