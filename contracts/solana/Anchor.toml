[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
hub = "3dF7ebo6DErpveMLxGAg6KTkTanGYLHmVXvqTWkqhpmL"
offer = "8V7KPa396tMUbU1HpuGGWAWMddfsuQ5K5vLMnxdAurFv"
price = "HpUVnehKAfNRzC12m9EYwhwjMwbWKTbcaCwPpwVGoNrC"
profile = "HNKH412Fsfe8vdBudCnsbmB9PwYxcxYfktfmyTWgiKbd"
