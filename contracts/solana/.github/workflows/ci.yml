name: CI

on:
  push:
    branches: [ main ] # Or your default branch
  pull_request:
    branches: [ main ] # Or your default branch

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # As per CONVERSION_PLAN.md

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI (avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install latest
          avm use latest
        # CONVERSION_PLAN.md specifies Anchor v0.31.x. 'latest' should get this or newer.
        # If specific version is needed:
        # avm install 0.31.0
        # avm use 0.31.0

      - name: Cache Solana build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/solana
            target
            programs/*/target
          key: ${{ runner.os }}-solana-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: ~/.npm # if using npm
          # path: $(yarn cache dir) # if using yarn, adjust path
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }} # or package-lock.json
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (Yarn)
        run: yarn install --frozen-lockfile
        working-directory: ./contracts/solana # Adjust if Anchor.toml is elsewhere

      - name: Lint Rust code
        run: cargo clippy --all --all-targets -- -D warnings
        working-directory: ./contracts/solana

      - name: Build Anchor programs
        run: anchor build
        working-directory: ./contracts/solana

      - name: Run Anchor tests
        run: anchor test
        working-directory: ./contracts/solana 